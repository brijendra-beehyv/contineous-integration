name: Build and Push Image

on:
  workflow_dispatch: &inputs
    inputs:
      image-name:
        description: 'Name of the image'
        type: string
        required: true
      dockerfile-dir:
        description: 'Path to Dockerfile'
        type: string
        required: true
  workflow_call: *inputs

jobs:
  build-n-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx for caching
        uses: docker/setup-buildx-action@v3

      - name: Login to docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}
          # This section defines the tagging logic per environment
          tags: |
            # 1. Dev/Staging: Tag with the branch name (e.g., 'develop')
            type=ref,event=branch
            # 2. Integration: Tag with the short git SHA (e.g., 'sha-7b12f34')
            type=sha
            # 3. Production: Tag with SemVer if a git tag is pushed (e.g., '1.2.0')
            type=semver,pattern={{version}}
            # 4. Global: Update 'latest' only on main branch pushes
            type=edge,branch=main
      
      - name: Build and push image with 
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.dockerfile-dir }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # This pulls all the tags generated in the 'meta' step above
          
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
