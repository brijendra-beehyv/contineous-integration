name: Build and Push Image

on:
  workflow_dispatch: &inputs
    inputs:
      image-name:
        description: 'Name of the image'
        type: string
        required: true
      dockerfile-path:
        description: 'Path to Dockerfile'
        type: string
        required: true
  workflow_call: *inputs

jobs:
  build-n-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Mandatory for caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push image with 
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.dockerfile-path }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:latest
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ github.sha }}
