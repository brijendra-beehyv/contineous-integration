name: Just o play around

on:
  workflow_dispatch:
    inputs:
      run:
        type: boolean
        description: "Tick"
        default: false

jobs:
  first:
    if: ${{ github.event.inputs.run }}
    runs-on: ubuntu-latest

    steps:
      - name: Some step
        run: |
          db_password="abcd1234"
          echo "::add-mask::$db_password"
          echo "db_password=$db_password" >> $GITHUB_ENV

      - name: A different step ${{ env.db_password }}
        run: echo $db_password

  second:
    needs: first
    if: ${{ !cancelled() && !failure() }}
    
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ inputs.run == 'true' }} ${{ inputs.run == 'false' }}"